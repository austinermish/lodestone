name: YAOS Server Ops (Reusable)

on:
  workflow_call:
    inputs:
      action:
        required: true
        type: string
      version:
        required: false
        type: string
        default: ""
      release_repo:
        required: false
        type: string
        default: "Opkalla/yaos"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Configure git identity
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Apply YAOS server artifact
        if: ${{ inputs.action == 'update' }}
        env:
          YAOS_RELEASE_REPO: ${{ inputs.release_repo }}
          YAOS_RELEASE_VERSION: ${{ inputs.version }}
        run: node scripts/update-from-release.mjs

      - name: Revert last YAOS update commit
        if: ${{ inputs.action == 'revert' }}
        run: node scripts/revert-last-update.mjs

      - name: Commit and push update if changed
        if: ${{ inputs.action == 'update' }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No YAOS server changes to commit."
            exit 0
          fi
          VERSION="$(node -p "require('./package.json').version")"
          git commit -m "yaos(server): update to ${VERSION}"
          git push

      - name: Push revert commit
        if: ${{ inputs.action == 'revert' }}
        run: git push
