name = "lodestone-cloudflare"
main = "src/index.ts"
compatibility_date = "2026-03-02"
workers_dev = true

[[durable_objects.bindings]]
name = "LODESTONE_SYNC"
class_name = "VaultSyncServer"

[[durable_objects.bindings]]
name = "LODESTONE_CONFIG"
class_name = "ServerConfig"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VaultSyncServer", "ServerConfig"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["HubRegistry"]

# HubRegistry backed a hub/spoke DO-to-DO bridge architecture that was
# superseded in May 2026 by same-Durable-Object room sync (hub and spoke both
# connect to one Y.Doc keyed by roomId) — the bridge was never wired into the
# client that replaced it and has been deleted as dead code. This migration
# formally decommissions the class; Cloudflare requires it (or deployment
# fails with "class no longer exported but referenced by migration history").
[[migrations]]
tag = "v3"
deleted_classes = ["HubRegistry"]

[observability.logs]
enabled = true
