name = "yaos"
main = "src/index.ts"
compatibility_date = "2026-03-02"
workers_dev = true

[[durable_objects.bindings]]
name = "YAOS_SYNC"
class_name = "VaultSyncServer"

[[durable_objects.bindings]]
name = "YAOS_CONFIG"
class_name = "ServerConfig"

[[durable_objects.bindings]]
name = "YAOS_HUB"
class_name = "HubRegistry"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VaultSyncServer", "ServerConfig"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["HubRegistry"]

[observability.logs]
enabled = true
